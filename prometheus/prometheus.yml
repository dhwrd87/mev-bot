global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - alert_rules.yml
  - alerts/mevbot_alerts.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'mev-bot'
    scrape_interval: 10s
    static_configs:
      - targets: ['mev-bot:9100']

  - job_name: 'alertmanager'
    static_configs:
      - targets: ['mev-alertmanager:9093']

  # Optional infrastructure jobs.
  # Enable when corresponding services are added to docker compose.
