[pytest]
addopts = -q
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
markers =
    unit: pure logic tests with no external service dependency
    integration: tests that require running stack/services
    contract: contract-level behavior tests
    e2e: end-to-end flow tests
    asyncio: async tests executed by plugin or local conftest fallback
    fork: tests that require a forked RPC / builders
    slow: long-running tests
