{
  "family": "evm",
  "chain": "base",
  "network": "mainnet",
  "chain_id": 8453,
  "rpc": {
    "endpoints": [
      {
        "alias": "publicnode",
        "http": "https://base-rpc.publicnode.com",
        "ws": "wss://base-rpc.publicnode.com"
      },
      {
        "alias": "base",
        "http": "https://mainnet.base.org",
        "ws": "wss://mainnet.base.org"
      },
      {
        "alias": "infura",
        "http": "https://base-mainnet.infura.io/v3/${INFURA_KEY}",
        "ws": "wss://base-mainnet.infura.io/ws/v3/${INFURA_KEY}"
      }
    ]
  },
  "explorer": {
    "base_url": "https://basescan.org",
    "tx_url": "https://basescan.org/tx/{tx_hash}",
    "address_url": "https://basescan.org/address/{address}",
    "block_url": "https://basescan.org/block/{block}"
  },
  "native_asset": {
    "symbol": "ETH",
    "decimals": 18
  },
  "risk": {
    "max_fee_gwei": 120.0,
    "slippage_bps": 100,
    "max_daily_loss_usd": 500.0,
    "min_edge_bps": 8.0
  },
  "dexes_enabled": [
    "univ2_default",
    "univ3_default"
  ],
  "dex_configs": {
    "univ2_default": {
      "type": "evm_univ2",
      "router": "${BASE_UNIV2_ROUTER}",
      "factory": "${BASE_UNIV2_FACTORY}",
      "fee_bps": 30
    },
    "univ3_default": {
      "type": "evm_univ3",
      "factory": "${BASE_UNIV3_FACTORY}",
      "quoter": "${BASE_UNIV3_QUOTER}",
      "swap_router": "${BASE_UNIV3_SWAP_ROUTER}",
      "fee_tiers": [
        500,
        3000,
        10000
      ]
    }
  }
}
