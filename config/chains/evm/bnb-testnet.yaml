{
  "family": "evm",
  "chain": "bnb-testnet",
  "network": "testnet",
  "chain_id": 97,
  "rpc": {
    "endpoints": [
      {
        "alias": "publicnode",
        "http": "https://bsc-testnet-rpc.publicnode.com",
        "ws": "wss://bsc-testnet-rpc.publicnode.com"
      },
      {
        "alias": "bsc",
        "http": "https://data-seed-prebsc-1-s1.binance.org:8545",
        "ws": "wss://bsc-testnet.publicnode.com"
      },
      {
        "alias": "infura",
        "http": "https://bsc-testnet.infura.io/v3/${INFURA_KEY}",
        "ws": "wss://bsc-testnet.infura.io/ws/v3/${INFURA_KEY}"
      }
    ]
  },
  "explorer": {
    "base_url": "https://testnet.bscscan.com",
    "tx_url": "https://testnet.bscscan.com/tx/{tx_hash}",
    "address_url": "https://testnet.bscscan.com/address/{address}",
    "block_url": "https://testnet.bscscan.com/block/{block}"
  },
  "native_asset": {
    "symbol": "tBNB",
    "decimals": 18
  },
  "risk": {
    "max_fee_gwei": 120.0,
    "slippage_bps": 100,
    "max_daily_loss_usd": 500.0,
    "min_edge_bps": 8.0
  },
  "dexes_enabled": [
    "univ2_default",
    "univ3_default"
  ],
  "dex_configs": {
    "univ2_default": {
      "type": "evm_univ2",
      "router": "${BNB_TEST_UNIV2_ROUTER}",
      "factory": "${BNB_TEST_UNIV2_FACTORY}",
      "fee_bps": 25
    },
    "univ3_default": {
      "type": "evm_univ3",
      "factory": "${BNB_TEST_UNIV3_FACTORY}",
      "quoter": "${BNB_TEST_UNIV3_QUOTER}",
      "swap_router": "${BNB_TEST_UNIV3_SWAP_ROUTER}",
      "fee_tiers": [
        100,
        500,
        2500,
        10000
      ]
    }
  }
}
