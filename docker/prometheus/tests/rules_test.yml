rule_files:
  - ../alert_rules.yml

evaluation_interval: 1m

tests:
- interval: 1m
  input_series:
  # Attempts increment every minute for 40 minutes
  - series: 'mevbot_bundle_attempts_total{builder="flashbots_builder",chain="polygon"}'
    values: '0+1x40'
  # Inclusions stay at zero the whole time
  - series: 'mevbot_bundle_inclusions_total{builder="flashbots_builder",chain="polygon"}'
    values: '0+0x40'

  alert_rule_test:
  - eval_time: 35m             # 30m window satisfied + 5m "for" duration
    alertname: NoBundleInclusions
    exp_alerts:
    - exp_labels:
        chain: polygon
        severity: critical     # matches the rule's labels
    # exp_annotations are optional; omit for robustness
